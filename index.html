  <body>

    <script>
      // Netlify Identity is only needed here to catch invite/recovery links
      // (they land on the site root with a token in the hash). Load the widget
      // lazily in that case only, so normal visitors never fetch it.
      if (/[#&](invite_token|confirmation_token|recovery_token|email_change_token)=/.test(window.location.hash)) {
        var s = document.createElement('script');
        s.src = 'https://identity.netlify.com/v1/netlify-identity-widget.js';
        s.onload = function () {
          window.netlifyIdentity.on('init', function (user) {
            if (!user) {
              window.netlifyIdentity.on('login', function () {
                document.location.href = '/admin/';
              });
            }
          });
        };
        document.head.appendChild(s);
      }
    </script>
