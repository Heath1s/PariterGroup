# Decap CMS — edits commit to the GitHub repo; Netlify rebuilds and publishes.
backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

# Each entry below is one editable section. Field names map 1:1 to the JSON
# files the site reads from, so saving here changes exactly what's on the page.
collections:
  - name: content
    label: "Site content"
    files:
      - name: hero
        label: "Hero"
        file: "src/content/hero.json"
        fields:
          - { name: eyebrow, label: Eyebrow, widget: string }
          - { name: headline, label: Headline, widget: string }
          - { name: sub, label: Subtext, widget: text }
          - { name: ctaPrimary, label: "Primary button", widget: string }
          - { name: ctaSecondary, label: "Secondary button", widget: string }
          - name: docket
            label: "Order docket"
            widget: object
            fields:
              - { name: code, label: Code, widget: string }
              - { name: kind, label: Kind, widget: string }
              - { name: said, label: "Said line", widget: string }
              - name: rows
                label: Rows
                widget: list
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: value, label: Value, widget: string }
              - { name: stamp, label: Stamp, widget: string }
              - { name: note, label: Note, widget: text }
      - name: tagline
        label: "Tagline (scroll-fill)"
        file: "src/content/tagline.json"
        fields:
          - { name: eyebrow, label: Eyebrow, widget: string }
          - { name: text, label: "Line — fills to dark on scroll", widget: text }
          - { name: accent, label: "Closing phrase — fills to red", widget: text }
      - name: workday
        label: "A day on Pariter (scroll story)"
        file: "src/content/workday.json"
        fields:
          - { name: eyebrow, label: Eyebrow, widget: string }
          - { name: heading, label: Heading, widget: string }
          - { name: sub, label: Subtext, widget: text }
          - name: steps
            label: "Steps (each travels said → kept)"
            widget: list
            fields:
              - { name: time, label: "Time of day", widget: string }
              - { name: kind, label: Kind, widget: string }
              - { name: said, label: "What's said", widget: string }
              - { name: kept, label: "What's recorded", widget: string }
              - { name: stamp, label: Stamp, widget: string }
              - { name: caption, label: "Caption", widget: text }
          - name: metrics
            label: "End-of-day metrics"
            widget: list
            fields:
              - { name: label, label: Label, widget: string }
              - { name: to, label: "Counts up to", widget: number }
              - { name: suffix, label: "Suffix (optional)", widget: string, required: false }
      - name: approach
        label: "Approach"
        file: "src/content/approach.json"
        fields:
          - { name: eyebrow, label: Eyebrow, widget: string }
          - { name: heading, label: Heading, widget: string }
          - { name: sub, label: Subtext, widget: text }
          - name: steps
            label: Steps
            widget: list
            fields:
              - { name: n, label: Number, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: body, label: Body, widget: text }
      - name: capabilities
        label: "What we do"
        file: "src/content/capabilities.json"
        fields:
          - { name: eyebrow, label: Eyebrow, widget: string }
          - { name: heading, label: Heading, widget: string }
          - { name: sub, label: Subtext, widget: text }
          - name: items
            label: Cards
            widget: list
            fields:
              - { name: tick, label: Tick, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: body, label: Body, widget: text }
          - name: vision
            label: "Where this goes"
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: heading, label: Heading, widget: string }
              - { name: body, label: Body, widget: text }
              - { name: pull, label: "Pull quote", widget: string }
          - name: alternatives
            label: "Alternatives"
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - name: items
                label: Items
                widget: list
                fields:
                  - { name: tick, label: Tick, widget: string }
                  - { name: body, label: Body, widget: text }
      - name: testimonials
        label: "Stories"
        file: "src/content/testimonials.json"
        fields:
          - { name: eyebrow, label: Eyebrow, widget: string }
          - { name: heading, label: Heading, widget: string }
          - { name: note, label: Note, widget: text }
          - name: quotes
            label: Quotes
            widget: list
            fields:
              - { name: body, label: Quote, widget: text }
              - { name: who, label: Who, widget: string }
              - { name: where, label: Where, widget: string }
              - { name: result, label: Result, widget: string }
      - name: about
        label: "About"
        file: "src/content/about.json"
        fields:
          - { name: eyebrow, label: Eyebrow, widget: string }
          - { name: heading, label: Heading, widget: string }
          - { name: body1, label: "Paragraph 1", widget: text }
          - { name: body2, label: "Paragraph 2", widget: text }
          - { name: pull, label: "Pull quote", widget: string }
          - name: who
            label: "Who we work with"
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: heading, label: Heading, widget: string }
              - { name: body, label: Body, widget: text }
              - { name: note, label: Note, widget: string }
      - name: trust
        label: "Security"
        file: "src/content/trust.json"
        fields:
          - { name: eyebrow, label: Eyebrow, widget: string }
          - { name: heading, label: Heading, widget: string }
          - { name: sub, label: Subtext, widget: text }
          - name: points
            label: Points
            widget: list
            fields:
              - { name: k, label: Tag, widget: string }
              - { name: t, label: Title, widget: string }
              - { name: b, label: Body, widget: text }
      - name: contact
        label: "Contact / close"
        file: "src/content/contact.json"
        fields:
          - { name: closeEyebrow, label: "Close eyebrow", widget: string }
          - { name: closeHeading, label: "Close heading", widget: string }
          - name: docket
            label: "End-of-day docket"
            widget: object
            fields:
              - { name: code, label: Code, widget: string }
              - { name: kind, label: Kind, widget: string }
              - { name: said, label: "Said line", widget: string }
              - name: rows
                label: Rows
                widget: list
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: value, label: Value, widget: string }
              - { name: stamp, label: Stamp, widget: string }
              - { name: note, label: Note, widget: string }
          - { name: closePull, label: "Close pull quote", widget: string }
          - { name: introEyebrow, label: "Form eyebrow", widget: string }
          - { name: introHeading, label: "Form heading", widget: string }
          - { name: introBody, label: "Form body", widget: text }
          - { name: email, label: "Contact email", widget: string }
      - name: general
        label: "Navigation & footer"
        file: "src/content/general.json"
        fields:
          - name: navLinks
            label: "Nav links"
            widget: list
            fields:
              - { name: label, label: Label, widget: string }
              - { name: href, label: "Anchor (e.g. #about)", widget: string }
          - { name: navCta, label: "Nav button", widget: string }
          - { name: footerTagline, label: "Footer tagline", widget: string }
          - { name: footerEmail, label: "Footer email", widget: string }
          - { name: footerLegal1, label: "Legal line 1", widget: string }
          - { name: footerLegal2, label: "Legal line 2", widget: string }
          - { name: footerBottom, label: "Footer bottom line", widget: string }
